name: Build and deploy a container to an Azure Web App

env:
  AZURE_WEBAPP_NAME: 'webapp-aula1238'

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Login no Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login no ACR
      run: az acr login --name ericopet

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3.0.0

    - name: Build Docker
      run: |
        docker build -t ericopet.azurecr.io/minha-app:latest .

    - name: Push Docker
      run: |
        docker push ericopet.azurecr.io/minha-app:latest

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Development'
    steps:
    - name: Login no Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        images: 'ericopet.azurecr.io/minha-app:latest'
